services:
  - type: web
    name: adepetbot
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npx prisma db push
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: adepetbot-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: WEB_BASE_URL
        sync: false

databases:
  - name: adepetbot-db
    plan: free
    databaseName: adepetbot
    user: adepetbot
